<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>

<div class="h-screen flex flex-column bg-cover" style="background: url('assets/layout/images/pages/login-bg.jpg')">
    <div class="align-self-center mt-auto mb-auto">
        <div class="text-center z-5 flex flex-column border-1 border-round-md surface-border surface-card px-3">
            <div>
                <img class="h-12rem" src="assets/layout/images/logo-zenware.png" />
            </div>
            <div class="text-color-secondary mb-5 px-7">Ingrese sus datos de acceso, por favor!</div>

            <form [formGroup]="frmDatos">
            <div class="w-full flex flex-column gap-3 px-3 pb-6">
                <span class="p-input-icon-left">
                    <i class="pi pi-envelope"></i>
                    <input type="text" class="w-full" formControlName="loginUser" pInputText placeholder="Usuario" />
                </span>
                <span class="p-input-icon-left">
                    <i class="pi pi-key"></i>
                    <input type="password" class="w-full" formControlName="claveUser" pInputText placeholder="Contraseña" />
                </span>
                <button pButton pRipple class="w-full my-3 px-3" style="background-color: #03A9F4" label="Iniciar Sesión" (click)="validarLogin()"></button>
            </div>
        </form>
        </div>
    </div>
</div>

<p-toast></p-toast>
