<div class="w-full flex flex-column gap-3 px-3 pb-6" (keydown.enter)="validaLogin()">
    <span class="p-input-icon-left">
        <i class="pi pi-key"></i>
        <input type="password" class="w-full p-inputtext-sm" [formControl]="claveUser" pInputText placeholder="Contraseña" />
    </span>
    <button pButton pRipple class="w-full my-3 px-3" style="background-color: #03A9F4" label="Iniciar Sesión"
        [loading]="isLoading" (click)="validaLogin()"></button>
</div>
