<form [formGroup]="registerFormRegistro" class="p-fluid p-formgrid grid col-12 lg:col-12 text-sm p-0 border-1 surface-border border-round m-2">                      
    <!-- <div class="sm:col-12 lg:col-6 md:col-12 col-12">
        <label class="block text-base font-semibold mb-1">N° Prog. Det.</label>
        <span class="p-fluid">
            <input pInputText type="text" class="font-semibold" formControlName="idprogramaciondet" class="p-inputtext-sm"/>
        </span>
    </div> 
    <div class=" sm:col-8 lg:col-9 md:col-12"></div>-->
    <div class="sm:col-6 lg:col-6 md:col-3 col-12">
        <label class="block text-base font-semibold mb-1">Tipo<span class="text-red-500 font-bold"> * </span></label>
        <span class="p-fluid mt-1">
            <p-dropdown [options]="lstTipo" formControlName="codtipo" placeholder="Seleccionar Origen" optionLabel="nomtipo" 
            optionValue="codtipo" appendTo="body" [readonly]=onlyRead class="p-inputtext-sm"></p-dropdown>
        </span>
    </div> 
    <div class="sm:col-6 lg:col-6 md:col-12  col-12">
        <label class="block text-base font-semibold mb-1">N° Documento<span class="text-red-500 font-bold"> * </span></label>                        
        <span class="p-fluid mt-1">
            <input pInputText type="text" class="font-semibold" formControlName="iddocumentoprc" class="p-inputtext-sm"/>
        </span>
    </div>
    <div class="col-12 sm:col-12 lg:col-6 md:col-12 justify-content-end -mt-3">
        <label class="block text-base font-semibold">Fecha<span class="text-red-500 font-bold"> * </span></label>
        <span class="p-input-icon-left w-auto p-fluid" style="height: 3rem;" >
            <p-calendar formControlName="fechaprog" dateFormat="dd/mm/yy" [showTime]="false" [showIcon]="true" [required]="true" inputId="start"
            inputStyleClass="w-full cursor-pointer p-inputtext-sm" appendTo="body" ></p-calendar>
        </span>
    </div>
    <div class=" sm:col-8 lg:col-6 md:col-12 -mt-3"></div>
    <div class="col-12 sm:col-6 lg:col-6 md:col-6 -mt-3">
        <label class="block text-base font-semibold mb-1">Moneda <span class="text-red-500 font-bold"> * </span></label>  
        <span class="p-fluid mt-1">
            <p-dropdown [options]="lstMonedas" formControlName="idmoneda" placeholder="Seleccionar..." optionLabel="desmoneda" 
            optionValue="idmoneda" appendTo="body" class="p-inputtext-sm"></p-dropdown>
        </span>                                      
    </div> 
   
    <div class="sm:col-6 lg:col-6 md:col-12 col-12 -mt-3">
        <label class="block text-base font-semibold mb-1">Monto<span class="text-red-500 font-bold"> * </span></label>                        
        <span class="p-fluid mt-1">
            <p-inputNumber class="w-full" formControlName="montoprog" locale="es-PE" mode="decimal" [minFractionDigits]="2" class="p-inputtext-sm"></p-inputNumber>
        </span>
    </div>
    
</form>

<div class="flex justify-content-end">
<button pButton icon="pi pi-save" label="Guardar" (click)="guardarProg()"
class="w-full sm:w-auto flex-order-0 sm:flex-order-0 p-button-primary mt-2"></button> 
</div>
