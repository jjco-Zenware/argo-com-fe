<div class="card m-4">

    <!-- Header -->
    <div class="cm-header">
        <div class="cm-header-left">
            <div class="cm-header-icon-wrap">
                <i class="pi pi-arrows-h cm-header-icon"></i>
            </div>
            <div>
                <div class="cm-header-title">MOVIMIENTOS BANCARIOS</div>
                <div class="cm-header-sub">Consulte y gestione sus movimientos bancarios</div>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="oc-toolbar">
        <form [formGroup]="frmDatos" class="oc-toolbar-form">
            <div class="oc-field">
                <label class="cm-label">Desde</label>
                <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechaInicio" formControlName="fecini"
                    [readonlyInput]="true" appendTo="body" class="p-inputtext-sm"
                    [inputStyle]="{'height':'2.2rem'}"></p-calendar>
            </div>
            <div class="oc-field">
                <label class="cm-label">Hasta</label>
                <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechaFin" formControlName="fecfin"
                    [readonlyInput]="true" appendTo="body" class="p-inputtext-sm"
                    [inputStyle]="{'height':'2.2rem'}"></p-calendar>
            </div>
            <div class="oc-field">
                <label class="cm-label">Moneda</label>
                <p-dropdown [options]="lstMonedas" formControlName="idmoneda" placeholder="Seleccionar..."
                    optionLabel="desmoneda" optionValue="idmoneda" appendTo="body"
                    class="p-inputtext-sm"></p-dropdown>
            </div>
        </form>
        <div class="cm-actions">
            <button pButton type="button" (click)="getListar()" pTooltip="Buscar Registros"
                tooltipPosition="bottom" class="cm-btn cm-btn-search" icon="pi pi-search"></button>
            <button pButton type="button" pTooltip="Exportar Excel" tooltipPosition="bottom"
                class="cm-btn cm-btn-load" icon="pi pi-file-excel"></button>
        </div>
    </div>

</div>

<p-toast></p-toast>
<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '350px'}"
    acceptButtonStyleClass="p-button p-button-info surface-border"
    rejectButtonStyleClass="p-button p-button-outlined surface-border text-900"></p-confirmDialog>
