<div class="card m-4">
    <div class="grid mt-2">
        <div class="flex justify-content-between col-12 -mt-3 gap-2">
            <div *ngIf="visXperfil" style="display: flex; justify-content: end;" class="mt-2 pl-1 h-2rem">
                <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-file"
                    label="Nuevo" pTooltip="Nuevo" tooltipPosition="bottom" (click)="getRegistro([])"></button>
            </div>
            <div class="mb-1 py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                <span class="text-base font-semibold">MANTENIMIENTO DE CAJAS</span>
            </div>
        </div>
    </div>

    <div class="flex justify-content-end col-12 -mt-3 gap-2">
        <div class="field sm:col-3 md:col-2 lg:col-3 -mt-3 gap-2">
            <button pButton type="button" (click)="getListar()" pTooltip="Buscar Registros" tooltipPosition="bottom"
                class="font-semibold mt-2 justify-content-center h-2.5rem w-3rem" icon="pi pi-search"></button>
            <!-- <button pButton type="button" (click)="getExportarExcel(dt1)" pTooltip="Exportar Excel"
                    tooltipPosition="bottom"
                    class="font-semibold mt-3 justify-content-center h-2.5rem w-3rem bg-green-500 ml-2"
                    icon="pi pi-file-excel"></button> -->
        </div>
    </div>

    <p-table #dt1 [value]="listado" [rows]="25" [rowHover]="true" responsiveLayout="stack"
        [tableStyle]="{'min-width': '50rem'}" [paginator]="true" [showCurrentPageReport]="true"
        [resizableColumns]="true" [rowsPerPageOptions]="[25,50]"
        currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros"
        styleClass="p-datatable-sm card border-1 border-round surface-border">

        <ng-template pTemplate="header">
            <tr class="text-sm">
                <th [ngStyle]="{'width':'20px'}" class="bg-teal-50 border-1">
                    <div class="flex justify-content-between align-items-center">
                        N°
                    </div>
                </th>
                <th [ngStyle]="{'width':'50px'}" class="bg-teal-50 border-1">
                    <div class="justify-content-between align-items-center">
                        ID CAJA
                    </div>
                </th>
                <th [ngStyle]="{'width':'50px'}" class="bg-teal-50 border-1">
                    <div class="justify-content-between align-items-center">
                        NOMBRE DE CAJA
                    </div>
                </th>
                <th style="width: 60px; text-align:center;" class="bg-teal-50 border-1">
                    <div class="justify-content-between align-items-center">
                        ESTADO
                    </div>
                </th>
                <th style="width: 60px; text-align:center;" class="bg-teal-50 border-1">
                    <div class="justify-content-between align-items-center">
                        ID APERTURA
                    </div>
                </th>
                <th style="width: 60px;" class="bg-teal-50 border-1">
                    <div class="flex justify-content-between align-items-center">
                        ACCIONES
                    </div>
                </th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-data let-rowIndex="rowIndex">
            <tr class="text-sm">
                <td>
                    <div [ngStyle]="{'width':'20px'}">
                        {{rowIndex + 1}}
                    </div>
                </td>
                <td>
                    <div [ngStyle]="{'width':'50px'}">
                        {{data.idcaja}}
                    </div>
                </td>
                <td>
                    <div [ngStyle]="{'width':'60px'}">
                        {{data.nomcaja}}
                    </div>
                </td>
                <td>
                    <div [ngStyle]="{'width':'60px'}">
                        {{data.nomestadpcaja}}
                    </div>
                </td>
                <td>
                    <div [ngStyle]="{'width':'80px'}">
                        {{data.idaperturacaja }}
                    </div>
                </td>
                <td>
                    <div class="flex align-items-center m:justify-content-end" [ngStyle]="{'width':'60px'}">
                        <button pButton pRipple type="button" icon="pi pi-pencil" tooltipPosition="bottom"
                            pTooltip="Editar Caja" class="p-button-rounded p-button-text"
                            (click)="getRegistro(data)"></button>
                        <button pButton pRipple type="button" icon="pi pi-trash" tooltipPosition="bottom"
                            pTooltip="Eliminar Caja" class="p-button-rounded p-button-text text-900 text-red-600"
                            (click)="eliminarCaja(data)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8">No se encontraron registros.</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="loadingbody">
            <tr>
                <td colspan="8">Cargando datos. Espere por favor.</td>8
            </tr>
        </ng-template>
    </p-table>

</div>

<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-toast></p-toast>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>
