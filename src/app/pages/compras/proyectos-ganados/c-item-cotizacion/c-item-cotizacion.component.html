<div class="p-fluid py-0 border-1 surface-border border-round  col-12 mt-2">

    <form [formGroup]="frmDatosItem">
            <div class="flex grid mt-1">
                <div class="sm:col-12 lg:col-3 md:col-12">
                    <label class="block text-900 font-semibold">Producto</label>
                    <p-dropdown [options]="lstTipoProducto" formControlName="idtipoprod" optionLabel="nomtipoprod"
                        optionValue="idtipoprod" placeholder="Seleccionar Producto" appendTo="body" (onChange)="verControles($event.value)" ></p-dropdown>
                </div>
                <div class="sm:col-12 lg:col-9 md:col-12">
                    <label class="font-semibold">Descripción</label>
                    <textarea id="description" type="text" formControlName="descripcion" pInputTextarea [rows]="1"
                        style="resize: none" class="w-full"></textarea>
                </div>                      
            </div>
            <div class="flex grid mb-2">
                <div class="col-12 sm:col-12 lg:col-3 md:col-12">
                    <div class="flex">
                        <label class="block text-900 font-semibold">Marca</label>
                    </div>
                    <p-dropdown [options]="lstMarcas" formControlName="idmarca" optionLabel="nommarca"
                        optionValue="idmarca" placeholder="Seleccionar Marca" appendTo="body"></p-dropdown>
                </div> 
                <div class="sm:col-12 lg:col-2 md:col-12">
                    <label class="font-semibold">Cantidad</label>
                    <p-inputNumber (onInput)="calcularBCQ($event)" formControlName="cantidad"></p-inputNumber>
                </div>
                <div class="sm:col-12 lg:col-2 md:col-12">
                    <label class="font-semibold">Uni. Medida</label>
                    <span>
                        <p-dropdown [options]="lstUnidades" formControlName="idunidad" optionLabel="valoritem" placeholder="Seleccionar..."
                        optionValue="iditem" appendTo="body" ></p-dropdown>
                    </span>
                </div>
                <div class="sm:col-12 lg:col-2 md:col-12 ">
                    <label class="font-semibold">P. Unitario</label>
                    <p-inputNumber (onInput)="calcularBCPu($event)" formControlName="preciocosto" mode="decimal" locale="en-US" [minFractionDigits]="2"></p-inputNumber>
                </div>
                <div class="sm:col-12 lg:col-2 md:col-12">
                    <label class="font-semibold">Total</label>
                    <p-inputNumber class="surface-100 font-bold" formControlName="preciocostototal" mode="decimal" locale="en-US" [minFractionDigits]="2"></p-inputNumber>
                </div>                
            </div>
            <div class="flex grid">
                <div *ngIf="verporSerie" class="sm:col-12 lg:col-2 md:col-12">
                    <label class="font-semibold">N° Serie</label>
                    <input pInputText type="text" formControlName="serialnumber"/>
                </div>
                <div *ngIf="verSku" class="sm:col-12 lg:col-2 md:col-12 ">
                    <label class="font-semibold">SKU</label>
                    <input pInputText type="text" formControlName="sku"/>
                </div>
                
            <!-- </div>
            <div *ngIf="verporLic" class="flex grid"> -->
                <div *ngIf="verporLic"class="sm:col-12 lg:col-2 md:col-12">
                    <label class="font-semibold">N° Contrato</label>
                    <input pInputText type="text" formControlName="nrocontrato"/>
                </div>
                <div *ngIf="verporLic" class="sm:col-12 lg:col-3 md:col-12 ">
                    <label class="font-semibold">Fecha Inicio</label>
                    <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" formControlName="fecini"
                        [readonlyInput]="true" appendTo="body">
                    </p-calendar>
                </div>
                <div *ngIf="verporLic" class="sm:col-12 lg:col-3 md:col-12 ">
                    <label class="font-semibold">Fecha Fin</label>
                    <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" formControlName="fecfin"
                        [readonlyInput]="true" appendTo="body"></p-calendar>
                </div>
            </div>
    </form>
</div>
<div class="flex justify-content-end">
    <button pButton icon="pi pi-check" label="Agregar" (click)="guardarItem()"
    class="w-full sm:w-auto flex-order-0 sm:flex-order-0 p-button-primary mt-2"></button> 
</div>

<p-dialog [(visible)]="marcaVisible" [modal]="true" [closeOnEscape]="false" showEffect="fade" [style]="{width: '20vw'}" [breakpoints]="{'960px': '75vw'}">
    <p-header > <i class="pi pi-tag" style="margin-right: 10px;"></i>{{ headerTitle }} </p-header>
        <form [formGroup]="registerFormMarca" (ngSubmit)="guardarMarca()">
            <div class="p-fluid py-4 border-1 surface-border mb-3 p-3 border-round mt-2">
                <div class="mb-3 field">
                    <label class="font-semibold">Marca</label>
                    <input pInputText type="text" formControlName="nommarca" id="nommarca"/>
                </div>
            </div>
            <div class="flex justify-content-end">
                <button pButton icon="pi pi-check" label="Guardar" type="submit" class="p-button-primary"></button>
            </div>
        </form>
</p-dialog>
