
<p-card class="m-2 gap-1">
    <ng-template pTemplate="content">
        <div *ngIf="!verReasignar" class="p-fluid grid -mb-4 -mt-3">           
            <div class="col-3 h-3rem flex flex-column -mt-3">
                <label class="font-semibold">N° FACTURA</label>
                <label>{{ordencompra.nrofactura}}</label>
            </div>
            <div class="col-3 h-3rem flex flex-column -mt-3">
                <label class="font-semibold">MONTO</label>
                <label>{{ordencompra.simbmoneda}}{{ordencompra.s_monto_total}}</label>
            </div>
            <div class="col-6 h-3rem flex flex-column -mt-3">
                <label class="font-semibold">CÓDIGO PROYECTO</label>
                <label>{{ordencompra.codigoproyecto}}</label>
            </div>    
            <div class="col-12  flex flex-column mb-auto">
                <label class="font-semibold">NOMBRE COMERCIAL</label>
                <label>{{ordencompra.nomcomercial}}</label>
            </div>  
            <div class="col-12">
                <label class="font-semibold">COMENTARIO</label>
                <textarea id="description" name="description" type="text" [(ngModel)]="descripcion" pInputTextarea [rows]="2" style="resize: none" 
                class="w-full mt-1 p-inputtext-sm"></textarea>
            </div>
        </div>
        <div *ngIf="verReasignar"class="p-fluid grid -mb-4 -mt-3">
            <div class="col-12 flex flex-column">
                <label class="font-semibold">CENTRO COSTO ACTUAL</label>
                <label>{{ordencompra.descentrocosto}}</label>
            </div>
            <div class="col-12">
                <label class="font-semibold">NUEVO CENTRO COSTO</label>
                <span class="p-fluid mt-1">
                    <p-dropdown [options]="lstCentroCosto" [(ngModel)]="idcentrocosto"
                        placeholder="Seleccionar..." optionLabel="descentrocosto" class="p-inputtext-sm"
                        optionValue="idcentrocosto" appendTo="body" autoWidth="false"
                        [readonly]="onlyRead"></p-dropdown>
                </span>
            </div>
        </div>
    </ng-template>
    
    <ng-template pTemplate="footer" class="h-3rem">
        <button pButton [label]="btnTitleAccion" (click)="procesarTRX(btnIdAccion)" [className]="btnColor" type="submit" ></button>
    </ng-template>
    
</p-card>
