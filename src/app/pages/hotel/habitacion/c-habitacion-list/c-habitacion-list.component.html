<div class="card m-4">
    <div class="grid mt-2">
        <div class="flex justify-content-between col-12 -mt-3 gap-2">
            <div class="mb-1 py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                <span class="text-base font-semibold">HABITACIONES</span>
            </div>
        </div>
    </div>
</div>

<div class="card m-4">
    <ng-container *ngIf="habitacionesAgrupadas.length > 0; else noHabitaciones">
        <ng-container *ngFor="let grupo of habitacionesAgrupadas">
            <section class="mb-3">
                <div class="font-semibold text-lg mb-4 -mt-1 ml-3">{{grupo.rutaubicacion}}</div>
                <div class="grid border-1 border-round surface-border p-2 mx-2">
                    <div class="col-6 md:col-4 lg:col-3 xl:col-2"
                        *ngFor="let item of grupo.habitaciones; trackBy: trackByHabitacion">
                        <div class="habitacion-card border-1 border-round surface-border" pTooltip="{{item.tipoHabitacion}} - {{item.estadoHabitacion}}"
                            tooltipPosition="top" (click)="getHabitacion(item)">
                            <div class="habitacion-icon">
                                <i [class]="item.icono || 'pi pi-home'" [style.color]="item.color"></i>
                            </div>
                            <div class="habitacion-nombre">
                                <span>{{item.nomHabitacion}}</span>
                            </div>
                            <div class="habitacion-estado">
                                <span class="custom-badge" [style.backgroundColor]="item.color" [style.color]="'#fff'">
                                    {{item.estadoHabitacion}}
                                </span>
                            </div>
                            <p-divider></p-divider>
                            <div class="habitacion-actions">
                                <button pButton
                                    [disabled]="item.puedeReservar === 0"
                                    class="p-button-outlined p-button-sm" icon="pi pi-file"
                                    pTooltip="Reservar" tooltipPosition="bottom"
                                    (click)="reservarHabitacion(item)"></button>
                                <button *ngIf="item.acciones.length > 0" pButton pRipple type="button" icon="pi pi-ellipsis-v"
                                    class="p-button-rounded p-button-text p-button-sm" (click)="toggleMenu($event, item)"
                                    pTooltip="Acciones" tooltipPosition="bottom"></button>
                                <p-tieredMenu #menu [model]="menuItems" appendTo="body" [popup]="true"></p-tieredMenu>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </ng-container>
    </ng-container>

    <ng-template #noHabitaciones>
        <div class="flex flex-column align-items-center justify-content-center p-6">
            <i class="pi pi-home text-6xl text-400 mb-3"></i>
            <span class="text-xl text-500">No hay habitaciones disponibles</span>
        </div>
    </ng-template>
</div>

<p-blockUI [blocked]="blockedDocument">
    <div class="flex align-items-center justify-content-center">
        <p-progressSpinner></p-progressSpinner>
        <span class="ml-2">{{mensajeSpinner}}</span>
    </div>
</p-blockUI>
<p-toast></p-toast>
