<ng-container *ngIf="vistaLista; else visSecciones">
    <div class="p-fluid p-3 mb-1 m-4">
        <form [formGroup]="frmDatos" class="p-fluid p-formgrid grid md:col-12 sm:col-12 lg:col-9 text-sm"
            style="margin-bottom: 0;">
            <div style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
                <div class="md:col-6 sm:col-3 lg:col-2 col-6" style="margin-bottom: 0;">
                    <label class="font-semibold text-blue-600 text-base">Desde</label>
                    <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechainicio"
                        formControlName="fechainicio" [showOnFocus]="false" [readonlyInput]="true" appendTo="body"
                        [inputStyle]="{'height':'2.5rem'}" class="p-inputtext-sm">
                    </p-calendar>
                </div>
                <div class="md:col-6 sm:col-3 lg:col-2 col-6" style="margin-bottom: 0;">
                    <label class="font-semibold text-blue-600 text-base">Hasta</label>
                    <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechaFin" formControlName="fechafin"
                        [readonlyInput]="true" appendTo="body" class="p-inputtext-sm"
                        [inputStyle]="{'height':'2.5rem'}"></p-calendar>
                </div>
                <div class="field sm:col-3 md:col-2 gap-1" style="margin-bottom: 0;">
                    <button pButton type="button" (click)="obtenerData()" pTooltip="Buscar" tooltipPosition="bottom"
                        class="font-semibold mt-2 justify-content-center h-2.5rem w-3rem" icon="pi pi-search"></button>
                </div>
            </div>
        </form>
        <div class="leyenda-container"
            style="display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; margin-left: 0.5rem;">
            <ng-container *ngFor="let leyenda of dataLeyenda">
                <span style="display: flex; align-items: center; gap: 0.3rem;">
                    <span [style.background-color]="leyenda.color"
                        style="display: inline-block; width: 16px; height: 16px; border-radius: 4px; border: 1px solid #ccc;"></span>
                    <span style="font-size: 14px; color: #333;">{{ leyenda.nomestado }}</span>
                </span>
            </ng-container>
        </div>

        <div class="p-datatable p-component custom-table-wrapper">
            <table class="p-datatable-table sticky-header">
                <thead class="p-datatable-thead">
                    <tr class="header-row-1">
                        <th class="p-datatable-thead-cell p-text-center p-px-2"
                            style="border-bottom: none; min-width: 50px;"></th>
                        <th class="p-datatable-thead-cell p-text-center p-px-1" [attr.colspan]="dias.length"
                            style="border-bottom: none; min-width: 38px; max-width: 48px; width: 42px; text-align: center; font-size: 16px; font-weight: 700;">
                            {{ dataHabitaciones?.[0]?.fechas?.[0]?.mes || '' }}
                        </th>
                    </tr>
                    <tr class="header-row-2">
                        <th class="p-datatable-thead-cell p-text-center p-px-2"
                            style="min-width: 50px;">
                            Hab.</th>
                        <th *ngFor="let dia of dias" class="p-datatable-thead-cell p-text-center p-px-1"
                            style="min-width: 38px; max-width: 48px; width: 42px;">{{ dia }}</th>
                    </tr>
                </thead>
                <tbody class="p-datatable-tbody">
                    <tr *ngFor="let habitacion of dataHabitaciones" class="p-datatable-row">
                        <td class="p-datatable-td p-px-2 p-py-1 p-text-bold"
                            style="background: #f9fafb; border-right: 1px solid #e0e0e0; cursor: pointer; height: 18px; min-height: 14px; padding-top: 1px; padding-bottom: 1px;"
                            [attr.title]="habitacion.mensaje">
                            {{ habitacion.nomHabitacion }}
                        </td>
                        <td *ngFor="let dia of dias" class="p-datatable-td p-px-0 p-py-0"
                            style="border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; min-width: 38px; max-width: 48px; width: 42px; height: 18px; min-height: 14px; padding-top: 0; padding-bottom: 0;">
                            <ng-container *ngIf="getFechaInfo(habitacion, dia) as fechaInfo; else sindata">
                                <span [style.background-color]="fechaInfo.color" [attr.title]="fechaInfo.mensaje"
                                    class="cell-content"
                                    style="display: flex; align-items: center; justify-content: center; width: 100%; height: 16px; min-height: 12px; border-radius: 6px; cursor: pointer; color: #fff; font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-size: 13px;"
                                    (click)="procesarReserva(fechaInfo)"
                                    (contextmenu)="onCellContextMenu($event, fechaInfo)">
                                </span>
                            </ng-container>
                            <ng-template #sindata>
                                <span style="display: block; height: 16px; min-height: 12px;"
                                    (click)="procesarSinFecha(habitacion, dia)"></span>
                            </ng-template>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</ng-container>
<ng-template #visSecciones>
    <ng-container *ngIf="visSeccionReserva">
        <div class="p-fluid p-3 mb-1 card m-4" (OB_back)="getDetalle($event)">
            <div class="grid ">
                <div class="flex justify-content-between col-12 gap-2">
                    <div style="display: flex; justify-content: end;" class="mt-2 pl-2 h-2rem -ml-1">
                        <button pButton class="font-semibold p-button-outlined justify-content-center"
                            icon="pi pi-backward" label="Salir" pTooltip="Salir a Bandeja" tooltipPosition="left"
                            (click)="getBack()"></button>
                    </div>
                    <div class="mb-1 py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                        <span class="text-lg font-semibold">RESERVA N° {{dataPrc.idordencompra}}</span>
                    </div>
                </div>
            </div>
            <app-c-reserva-det [IA_data]="dataPrc"></app-c-reserva-det>
        </div>
    </ng-container>
</ng-template>

<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-toast></p-toast>

<div *ngIf="menuContextualVisible"
         class="custom-context-menu"
         [ngStyle]="{'top.px': menuContextualTop, 'left.px': menuContextualLeft, 'position': 'fixed', 'z-index': 9999}"
         (contextmenu)="$event.preventDefault()">
    <ul class="custom-context-menu-list">
        <li *ngFor="let opcion of opcionesMenuContextual"
                (click)="accionMenuContextual(opcion)"
                class="custom-context-menu-item">
            <i *ngIf="opcion.icono" [class]="opcion.icono" style="margin-right: 6px;"></i>{{ opcion.etiqueta }}
        </li>
    </ul>
</div>
