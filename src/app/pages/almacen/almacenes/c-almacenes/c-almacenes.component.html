<ng-container *ngIf="vistaLista; else visSecciones">
    <div class="card m-4">
        <div class="grid mt-2">
            <div class="flex justify-content-between col-12 -mt-3 gap-2">   
                <div style="display: flex; justify-content: end;" class="mt-2 pl-1 h-2rem">
                    <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-file" label="Nuevo"
                        pTooltip="Nueva Orden" tooltipPosition="left" (click)="onNuevo()" ></button>
                </div>                
                <div class="mb-1 border-1 surface-border py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                    <span class="text-base font-semibold">ALMACENES</span>
                </div>  
                       
            </div>
        </div>

        <form [formGroup]="frmDatos" class="mb-2 -mr-3 mt-1 ml-3">
            <div class="p-fluid p-formgrid grid col-9 h-5rem -ml-6">
                <div class="sm:col-6 lg:col-3 md:col-3 -mt-4 h-4rem field">
                    <label class="text-blue-600 font-semibold mb-1">OFICINA</label>
                    <span class="p-fluid mt-1">
                        <p-dropdown [options]="lstOficina" formControlName="idofi" placeholder="Seleccionar Oficina" optionLabel="nomoficina" 
                        optionValue="idofi" class="p-inputtext-sm"></p-dropdown>
                    </span>
                </div> 
                <div class="field col-12 md:col-2 -mt-4 gap-2">
                    <button pButton type="button" (click)="getListar()" pTooltip="Buscar Registros" tooltipPosition="bottom" 
                        class="font-semibold mt-4 justify-content-center h-2.5rem w-3rem w-auto h-auto" icon="pi pi-search"></button>
                </div>
            </div>
        </form> 

        <p-table #dt1 [value]="lstAlmacen" [rows]="10" [rowHover]="true" responsiveLayout="stack" [tableStyle]="{'min-width': '50rem'}"
            [paginator]="true" [showCurrentPageReport]="true" [resizableColumns]="true" [rowsPerPageOptions]="[10,25,50]"
            currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros" styleClass="p-datatable-sm card border-1 border-round surface-border">

            <ng-template pTemplate="header">
                <tr class="text-sm">
                    <th style="width: 10px" class="surface-200" >
                        <div class="flex justify-content-between align-items-center">
                            N°
                        </div>
                    </th>
                    <th [ngStyle]="{'width':'50px'}"  class="surface-200" >
                        <div class="justify-content-between align-items-center">
                            ID ALMACEN
                        </div>
                    </th>
                    <th [ngStyle]="{'width':'70px'}" class="surface-200" >
                        <div class="justify-content-between align-items-center">
                            OFICINA 
                        </div>
                    </th>
                    <th [ngStyle]="{'width':'70px'}" class="surface-200" >
                        <div class="justify-content-between align-items-center">
                            NOMBRE 
                        </div>
                    </th>
                    <th style="width: 150px;" class="surface-200" >
                        <div class="justify-content-between align-items-center">
                            DIRECCIÓN
                        </div>
                    </th>
                    <th style="width: 80px;" class="surface-200" >
                        <div class="flex justify-content-between align-items-center">
                            ACCIONES
                        </div>
                    </th>
                </tr>
                <!-- <tr >
                    <th></th>
                    <th *ngFor="let col of cols">
                        <input pInputText type="text" (input)="dt1.filter($any($event.target).value, col.field, col.filterMatchMode)" class="w-full h-2rem"/>                    
                    </th>
                </tr> -->
           
            </ng-template>
            <ng-template pTemplate="body" let-data let-rowIndex="rowIndex">
                <tr class="text-sm">
                    <td [ngStyle]="{'width':'10px'}">
                        {{rowIndex + 1}}
                    </td>
                    <td >
                        <div [ngStyle]="{'width':'50px'}">
                            {{data.idalmacen}}
                        </div>
                    </td>
                    <td>
                        <div [ngStyle]="{'width':'70px'}">
                            {{data.nomofi}}
                        </div>
                    </td>
                    <td>
                        <div [ngStyle]="{'width':'100px'}">
                            {{data.nomalmacen | uppercase}}
                        </div>
                    </td>
                    <td>
                        <div [ngStyle]="{'width':'60px'}">
                            {{data.diralmacen | uppercase}}
                        </div>
                    </td>
                    <td>
                        <div class="flex align-items-center m:justify-content-end" [ngStyle]="{'width':'160px'}">
                            <button pButton pRipple type="button" icon="pi pi-file-edit" tooltipPosition="bottom" pTooltip="Editar" class="p-button-rounded p-button-text z-3 ml-auto sm:ml-0 " (click)="onEditar(data)"></button>
                            
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="8">No se encontraron registros.</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="loadingbody">
                <tr>
                    <td colspan="8">Cargando datos. Espere por favor.</td>8
                </tr>
            </ng-template>
        </p-table>
    </div>
</ng-container>

<ng-template #visSecciones>

    <div class="p-fluid p-3 mb-1 card m-4" (OB_back)="getDetalle($event)">
        <div class="grid mt-2">
            <div class="flex justify-content-between col-12 -mt-3 gap-2">
                <div style="display: flex; justify-content: end;" class="mt-2 h-2rem">
                    <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-backward" label="Regresar"
                        pTooltip="Regresar" tooltipPosition="left" (click)="getBack()" ></button>                    
                </div>
                <div class="mb-1 border-1 surface-border py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                    <span class="text-base font-semibold">{{tituloDetalle}}</span>
                </div>       
            </div>
        </div>
        <app-c-almacenes-detalle [IA_data]="data"></app-c-almacenes-detalle>
    </div>

</ng-template>

<p-toast></p-toast>
<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '450px'}"
acceptButtonStyleClass="p-button p-button-info surface-border" rejectButtonStyleClass="p-button p-button-outlined surface-border text-900 "></p-confirmDialog>
