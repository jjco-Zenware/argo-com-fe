<div >
    <div class="flex mb-2 -mt-3 gap-2 border-1 border-round surface-border p-2 bg-blue-50">
        <button pButton icon="pi pi-save" label="Grabar" class="p-button-primary w-auto h-2rem" (click)="guardar()"></button>
    </div>
    <div class="card p-2">
        <p-tabView >
            <p-tabPanel>
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2">
                        <i class="pi pi-building"></i>
                        <span class="font-bold white-space-nowrap m-0">
                            Datos Generales
                        </span>
                    </div>
                </ng-template>

                <form [formGroup]="registerFormRegistro" class="card  grid lg:col-5 col-12  border-round surface-border p-2 m-2">  
                    <div class="p-fluid grid col-12 p-2 m-2">                               
                        <div class="col-6 sm:col-12 lg:col-6 md:col-12 col-12 ustify-content-end h-4rem field">
                            <label class="text-900 font-semibold mb-1">Tipo <span class="text-red-500 font-bold"> * </span></label>
                            <span class="p-fluid mt-1">
                                <p-dropdown [options]="lstTipoAlma" formControlName="tipoalmacen" placeholder="Seleccionar Tipo" optionLabel="valoritem" 
                                optionValue="iditem" class="p-inputtext-sm" [filter]="true"></p-dropdown>
                            </span>
                        </div> 
                        <div class="col-6 sm:col-12 lg:col-6 md:col-12 col-12 ustify-content-end h-4rem field">
                            <label class="text-900 font-semibold mb-1">Responsable <span class="text-red-500 font-bold"> * </span></label>
                            <span class="p-fluid mt-1">
                                <p-dropdown [options]="lstUsuarios" formControlName="idresponsable" placeholder="Seleccionar Responsable" optionLabel="nombre" 
                                optionValue="codigoUsuario" class="p-inputtext-sm" [filter]="true"></p-dropdown>
                            </span>
                        </div>       
                        <div class="sm:col-12 lg:col-12 md:col-12 col-12 mt-1">
                            <label class="block text-900 font-semibold">Nombre Almacén<span class="text-red-500 font-bold"> * </span></label>                        
                            <span class="p-fluid">
                                <input pInputText type="text" formControlName="nomalmacen" [readonly]=onlyRead class="p-inputtext-sm"/>
                            </span>
                        </div>
                        <div class="sm:col-12 lg:col-12 md:col-12 col-12 -mt-3">
                            <label class="block text-900 font-semibold">Dirección <span class="text-red-500 font-bold"> * </span></label>                        
                            <span class="p-fluid">
                                <textarea type="text" pInputTextarea [rows]="2" formControlName="diralmacen" style="resize: none" class="w-full p-inputtext-sm" [readonly]=onlyRead></textarea>
                            </span>
                        </div> 
                    </div>                     
                </form>               
            </p-tabPanel>             

            <p-tabPanel [disabled]=visUbicacion>
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2">
                        <i class="pi pi-map-marker"></i>
                        <span class="font-bold white-space-nowrap m-0">
                            Ubicación
                        </span>
                    </div>
                </ng-template>
                <div class="sm:col-12 lg:col-6 md:col-12 justify-content-end">
                    <h5 class="m-0 p-0">Estructura de Ubicación <span><i class="pi pi-info-circle text-red-400 text-xl" 
                        pTooltip="Información de ayuda sobre la estructura de ubicación en un Almacén"></i></span></h5>


                    <p-timeline [value]="events" layout="horizontal" align="top">
                        <ng-template pTemplate="marker" let-event>
                            <div class="justify-content-start align-items-center flex">
                                <span class="custom-marker shadow-2" [style.backgroundColor]="event.color">
                                    <i [ngClass]="event.icon"></i>
                                </span>
                            </div>

                        </ng-template>
                        <ng-template pTemplate="opposite" let-event>
                            {{event.status}}
                        </ng-template>
                    </p-timeline>
                </div>
                <!-- <div *ngIf="verbtnUbicacion" class="flex align-items-center m:justify-content-end gap-2 m-2">
                    <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-plus"  pTooltip="Nuevo" tooltipPosition="bottom" (click)="accionUbicacion(0)"></button>
                    <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-file-edit"  pTooltip="Editar" tooltipPosition="bottom" (click)="accionUbicacion(1)"></button>
                    <button pButton class="font-semibold p-button-outlined justify-content-center text-red-500" icon="pi pi-trash"  pTooltip="Eliminar" tooltipPosition="bottom" (click)="eliminarUbicacion()"></button>
                </div> -->
                  
                <!-- <p-tree 
                    [value]="files" 
                    class="w-full md:w-30rem" 
                    selectionMode="single"
                    [(selection)]="selectedFiles"
                    (onNodeSelect)="nodeSelect($event)" />   -->
                    
                     <p-tree [value]="files" selectionMode="single" [(selection)]="selectedFiles" (onNodeSelect)="nodeSelect($event)" id="tree">
                        <ng-template let-node pTemplate="default">
                            <span>{{node.label}}</span>
                             <i  class="pi pi-plus text-blue-500 cursor-pointer" style="margin-left: 5px;" pTooltip="Nuevo" tooltipPosition="top" (click)="accionUbicacion(node,0)"></i>   
                             <i *ngIf="node.key !== '0'" class="pi pi-file-edit text-green-500 cursor-pointer" style="margin-left: 5px;" pTooltip="Editar" tooltipPosition="top" (click)="accionUbicacion(node,1)"></i> 
                             <i *ngIf="node.key !== '0'" class="pi pi-trash text-red-500 cursor-pointer" style="margin-left: 5px;" pTooltip="Eliminar" tooltipPosition="top" (click)="eliminarUbicacion(node)"></i>                           
                            <!-- <button pButton class="font-semibold p-button-outlined justify-content-center " icon="pi pi-plus"  pTooltip="Nuevo" tooltipPosition="bottom" (click)="accionUbicacion(node,0)"></button>
                            <button pButton class="font-semibold p-button-outlined justify-content-center " icon="pi pi-file-edit"  pTooltip="Editar" tooltipPosition="bottom" (click)="accionUbicacion(node,1)"></button>
                            <button pButton class="font-semibold p-button-outlined justify-content-center text-red-500" icon="pi pi-trash"  pTooltip="Eliminar" tooltipPosition="bottom" (click)="eliminarUbicacion(node)"></button> -->
                        </ng-template>
                    </p-tree>
            </p-tabPanel>  
            
            <p-tabPanel [disabled]=visUbicacion>
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2">
                        <i class="pi pi-paperclip"></i>
                        <span class="font-bold white-space-nowrap m-0">
                            Adjuntos
                        </span>
                    </div>
                </ng-template>             
                <app-c-adjuntos *ngIf="verAdjunto" [IA_data]="dataAdjunto" ></app-c-adjuntos>                
            </p-tabPanel>   
        </p-tabView> 
    </div>
</div>


<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
