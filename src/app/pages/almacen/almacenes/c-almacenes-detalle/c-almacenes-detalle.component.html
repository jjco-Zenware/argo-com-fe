<div >
    <div class="flex mb-2 -mt-3 gap-2 border-1 border-round surface-border p-2 bg-blue-50">
        <button pButton icon="pi pi-save" label="Grabar" class="p-button-primary w-auto h-2rem" (click)="guardar()"></button>
    </div>
    <div class="card p-2">
        <p-tabView >
            <p-tabPanel>
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2">
                        <i class="pi pi-building"></i>
                        <span class="font-bold white-space-nowrap m-0">
                            Datos Generales
                        </span>
                    </div>
                </ng-template>

                <form [formGroup]="registerFormRegistro" class="card  grid lg:col-5 col-12  border-round surface-border p-2 m-2">  
                    <div class="p-fluid grid col-12 p-2 m-2">
                        <div class="sm:col-12 lg:col-3 md:col-12 col-12 h-4rem field">
                            <label class="block text-900 font-semibold mb-1">Código </label>
                            <span class="p-fluid">
                                <input pInputText type="text" class="font-semibold p-inputtext-sm" formControlName="idalmacen"/>
                            </span>
                        </div>
                        <div class="sm:col-12 lg:col-3 md:col-12 h-4rem field"></div>
                        <div class="col-6 sm:col-12 lg:col-6 md:col-12 col-12 ustify-content-end h-4rem field">
                            <label class="text-900 font-semibold mb-1">Oficina <span class="text-red-500 font-bold"> * </span></label>
                            <span class="p-fluid mt-1">
                                <p-dropdown [options]="lstOficina" formControlName="idofi" placeholder="Seleccionar Oficina" optionLabel="nomofi" 
                                optionValue="idofi" class="p-inputtext-sm"></p-dropdown>
                            </span>
                        </div>              
                        <div class="sm:col-12 lg:col-12 md:col-12 col-12 mt-1">
                            <label class="block text-900 font-semibold">Nombre <span class="text-red-500 font-bold"> * </span></label>                        
                            <span class="p-fluid">
                                <input pInputText type="text" formControlName="nomalmacen" [readonly]=onlyRead class="p-inputtext-sm"/>
                            </span>
                        </div>
                        <div class="sm:col-12 lg:col-12 md:col-12 col-12 -mt-3">
                            <label class="block text-900 font-semibold">Dirección <span class="text-red-500 font-bold"> * </span></label>                        
                            <span class="p-fluid">
                                <textarea type="text" pInputTextarea [rows]="2" formControlName="diralmacen" style="resize: none" class="w-full p-inputtext-sm" [readonly]=onlyRead></textarea>
                            </span>
                        </div> 
                    </div>                     
                </form>               
            </p-tabPanel>             

            <p-tabPanel [disabled]=visUbicacion>
                <ng-template pTemplate="header">
                    <div class="flex align-items-center gap-2">
                        <i class="pi pi-map-marker"></i>
                        <span class="font-bold white-space-nowrap m-0">
                            Ubicación
                        </span>
                    </div>
                </ng-template>
                <div *ngIf="verbtnUbicacion" class="flex align-items-center m:justify-content-end gap-2 m-2">
                    <button pButton class="font-semibold p-button-outlined justify-content-center " icon="pi pi-plus"  pTooltip="Nuevo" tooltipPosition="bottom" (click)="accionUbicacion(0)"></button>
                    <button pButton class="font-semibold p-button-outlined justify-content-center " icon="pi pi-file-edit"  pTooltip="Editar" tooltipPosition="bottom" (click)="accionUbicacion(1)"></button>
                    <button pButton class="font-semibold p-button-outlined justify-content-center text-red-500" icon="pi pi-trash"  pTooltip="Eliminar" tooltipPosition="bottom" (click)="accionUbicacion(2)"></button>
                </div>
                <p-tree 
                    [value]="files" 
                    class="w-full md:w-30rem" 
                    selectionMode="single"
                    [(selection)]="selectedFiles"
                    (onNodeSelect)="nodeSelect($event)" />                    
            </p-tabPanel>                  
        </p-tabView> 
    </div>
</div>


<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '450px'}"
acceptButtonStyleClass="p-button p-button-info surface-border" rejectButtonStyleClass="p-button p-button-outlined surface-border text-900 "></p-confirmDialog>
