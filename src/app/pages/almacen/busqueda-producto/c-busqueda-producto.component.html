<div class="mt-3">
    
    <form [formGroup]="frmDatos" class="mb-2 -mr-3 mt-1 -ml-3">
        <div class="p-fluid p-formgrid grid col-12 text-sm h-5rem">
            <!-- <div class="sm:col-4 lg:col-2 md:col-12 field -mt-3">
                <label class="font-semibold mb-1 text-blue-600">CÓDIGO</label>                        
                <span class="p-fluid">
                    <input pInputText type="text" formControlName="codproducto" class="p-inputtext-sm"/>
                </span>
            </div>  -->
            <div class="sm:col-6 lg:col-4 md:col-3 -mt-3 field">
                <label class="font-semibold mb-1 text-blue-600">DESCRIPCIÓN</label>                        
                <span class="p-fluid">
                    <textarea type="text" pInputTextarea [rows]="1" formControlName="desproducto" style="resize: none" class="w-full p-inputtext-sm" ></textarea>
                </span>
            </div>
            <div class="col-4 sm:col-6 lg:col-3 md:col-6 -mt-3 field">                            
                <label class="font-semibold mb-1 text-blue-600">FAMILIA</label>                            
                <span>
                    <p-dropdown [options]="lstFamilia" placeholder="Seleccionar..."  formControlName="idfamilia" class="p-inputtext-sm"
                    optionLabel="nomfamilia" optionValue="idfamilia" appendTo="body"  (onChange)="getSubFamilia($event.value)"></p-dropdown>            
                </span>
            </div> 
            <div class="col-4 sm:col-6 lg:col-3 md:col-6 -mt-3 field">                            
                <label class="font-semibold mb-1 text-blue-600">SUBFAMILIA</label>                            
                <span>
                    <p-dropdown [options]="lstSubFamilia" placeholder="Seleccionar..."  formControlName="idsubfamilia" class="p-inputtext-sm"
                    optionLabel="nomsubfamilia" optionValue="idsubfamilia" appendTo="body" ></p-dropdown>            
                </span>
            </div> 
           
            <div class="field col-12 md:col-2 -mt-3 gap-2">
                <button pButton type="button" (click)="getListar()" pTooltip="Buscar" tooltipPosition="bottom" 
                    class="font-semibold mt-4 justify-content-center h-2rem w-3rem w-auto h-auto" icon="pi pi-search"></button>
            </div>
        </div>
    </form> 

    <p-table #dt1 [value]="lstProducto" [rows]="5" [rowHover]="true" responsiveLayout="stack" [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true" [showCurrentPageReport]="true" [resizableColumns]="true" [rowsPerPageOptions]="[5,10]"
        currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros" 
        styleClass="p-datatable-sm">
           <ng-template pTemplate="header">
            <tr class="text-sm" >
                <th style="width: 20px" class="surface-200" >
                    <div class="flex justify-content-between align-items-center">
                        N°
                    </div>
                </th>
                <th class="surface-200">
                    <div [ngStyle]="{'width':'100px','text-align': 'center'}">
                        CÓDIGO
                    </div>
                </th>
                <th style="width: 300px;" class="surface-200">PRODUCTO</th>
                <th style="width: 300px;" class="surface-200">FAMILIA</th>
                <th style="width: 300px;" class="surface-200">SUBFAMILIA</th>
                <th style="width: 300px;" class="surface-200">MARCA</th>
                <th style="width: 300px;" class="surface-200">SELECCIONAR</th>            
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-data let-rowIndex="rowIndex">
            <tr>
                <td>{{rowIndex + 1}}</td>
                <td>{{data.codproducto}}</td>
                <td>{{data.despro}}</td>
                <td>{{data.nomfamilia}}</td>
                <td>{{data.nomsubfamilia}}</td>
                <td>{{data.nommarca}}</td>
                <td>
                    <button pButton type="button" icon="pi pi-check" tooltipPosition="bottom" pTooltip="Seleccionar Producto" (click)="seleccionarProducto(data)"></button>                     
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="12">No se encontraron registros.</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="loadingbody">
            <tr>
                <td colspan="12">Cargando datos. Espere por favor.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
