
<div class="card m-4">
    <div class="grid mt-2">
        <div class="flex justify-content-between col-12 -mt-3 gap-2">                                  
            <div class="mb-1 border-1 surface-border py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                <span class="text-base font-semibold">GRUPO/CATEGORÍA</span>
            </div>                         
        </div>
    </div>

    <form [formGroup]="frmDatos" class="p-fluid p-formgrid grid col-12 text-sm -mt-2">
            <div class="sm:col-6 lg:col-3 md:col-3 col-9 -mt-4 field h-4rem">
                <label class="text-blue-600 font-semibold mb-1">GRUPOS</label>                
                <span class="p-fluid mt-1">
                    <p-dropdown [options]="lstFamilia" placeholder="Seleccionar..."  formControlName="idfamilia" class="p-inputtext-sm"
                    optionLabel="nomfamilia" optionValue="idfamilia" appendTo="body"  (onChange)="getSubFamilia($event.value)"></p-dropdown> 
                </span>
            </div> 
            <div class="field col-3 md:col-2 -mt-4 gap-2 h-4rem">
                <button pButton type="button" pTooltip="Editar Grupo Seleccionado...!" tooltipPosition="bottom" (click)="editarGrupo()"
                    class="font-semibold mt-3 justify-content-center h-2.5rem w-3rem w-auto h-auto p-button-outlined" icon="pi pi-pencil"></button>
                <button pButton type="button" pTooltip="Agregar Grupo...!" tooltipPosition="bottom" (click)="agregarGrupo()"
                    class="font-semibold mt-3 justify-content-center h-2.5rem w-3rem w-auto h-auto ml-2" icon="pi pi-plus"></button>
            </div>
    </form> 

    <p-table #dt1 [value]="lstSubFamilia" [rows]="10" [rowHover]="true" responsiveLayout="stack" [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true" [showCurrentPageReport]="true" [resizableColumns]="true" [rowsPerPageOptions]="[10,25,50]"
        currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros" 
        styleClass="p-datatable-sm card border-1 border-round surface-border lg:col-8 col-12">
        <ng-template pTemplate="caption">
            <button pButton type="button" pTooltip="Agregar Categoria...!" tooltipPosition="bottom" label="Agregar" (click)="agregarClase()"
                class="font-semibold justify-content-center w-auto h-auto p-button-outlined -mt-2 mb-2" icon="pi pi-plus"></button>
            
        </ng-template>
           <ng-template pTemplate="header">
            <tr class="text-sm" >
                <th style="width: 30px" class="bg-teal-50 border-1" >
                    <div class="flex justify-content-between align-items-center">
                        N°
                    </div>
                </th>
                <th style="width: 100px;" class="bg-teal-50 border-1">CÓDIGO</th>
                <th style="width: 200px;" class="bg-teal-50 border-1">CATEGORÍA</th>
                <th style="width: 150px;" class="bg-teal-50 border-1">TIPO PRODUCTO</th>
                <th style="width: 150px;" class="bg-teal-50 border-1">CTA CONTABLE </th>
                <th style="width: 20px;" class="bg-teal-50 border-1">ACCIONES</th>
            </tr>
            
        </ng-template>
        <ng-template pTemplate="body" let-data  let-rowIndex="rowIndex">
            <tr>
                <td [ngStyle]="{'width':'30px', 'text-align': 'center'}">
                    {{rowIndex + 1}}
                </td>
                <td>{{data.codsubfamilia}}</td>
                <td>{{data.nomsubfamilia}}</td>
                <td>{{data.nomtipoprod}}</td>
                <td>{{data.codctactble}}</td>
                <td>
                    <div class="flex align-items-center m:justify-content-end" [ngStyle]="{'width':'160px'}">
                        <button pButton pRipple type="button" icon="pi pi-file-edit" tooltipPosition="bottom" pTooltip="Editar Categoria" 
                        class="p-button-rounded p-button-text z-3 ml-auto sm:ml-0 " (click)="editarClase(data)"></button>
                        
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="12">No se encontraron registros.</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="loadingbody">
            <tr>
                <td colspan="12">Cargando datos. Espere por favor.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog styleClass="testDialog" [(visible)]="grupoVisible" [modal]="true" [closeOnEscape]="false" showEffect="fade" [style]="{width: '20vw'}" [breakpoints]="{'960px': '75vw'}">
    <p-header >{{ headerTitle }} </p-header>
        <form [formGroup]="frmDatos" (ngSubmit)="prcGrupo()">
            <div class="p-fluid py-4 border-1 surface-border mb-3 p-3 border-round mt-2">
                <div class="mb-3 field">
                    <label class="font-semibold">CÓDIGO</label>
                    <input pInputText type="text" formControlName="codfamilia" class="p-inputtext-sm"/>
                </div>
                <div class="mb-3 field">
                    <label class="font-semibold">DESCRIPCIÓN</label>
                    <input pInputText type="text" formControlName="nomfamilia" class="p-inputtext-sm"/>
                </div>
            </div>
            <div class="flex justify-content-end">
                <button pButton icon="pi pi-save" label="Grabar" type="submit" class="p-button-primary w-auto"></button>
            </div>
        </form>
</p-dialog>

<p-dialog styleClass="testDialog" [(visible)]="claseVisible" [modal]="true" [closeOnEscape]="false" showEffect="fade" [style]="{width: '20vw'}" [breakpoints]="{'960px': '75vw'}">
    <p-header >{{ headerTitle }} </p-header>
        <form [formGroup]="frmDatos" (ngSubmit)="prcClase()">
            <div class="p-fluid py-4 border-1 surface-border mb-3 p-3 border-round mt-2">
                <div class="mb-3 field">
                    <label class="font-semibold">CÓDIGO<span class="text-red-500 font-bold"> * </span></label>
                    <input pInputText type="text" formControlName="codsubfamilia" class="p-inputtext-sm"/>
                </div>
                <div class="mb-3 field">
                    <label class="font-semibold">DESCRIPCIÓN<span class="text-red-500 font-bold"> * </span></label>
                    <input pInputText type="text" formControlName="nomsubfamilia" class="p-inputtext-sm"/>
                </div>
                <div class="mb-3 field">
                    <label class="font-semibold">TIPO PRODUCTO<span class="text-red-500 font-bold"> * </span></label>
                    <p-dropdown [options]="lstTipoProducto" formControlName="idtipoprod" optionLabel="nomtipoprod"
                        optionValue="idtipoprod" placeholder="Seleccionar Producto" appendTo="body"></p-dropdown>
                </div>
                <div class="mb-3 field">
                    <label class="font-semibold">CUENTA CONTABLE<span class="text-red-500 font-bold"> * </span></label>
                    <span class="p-fluid">
                        <p-autoComplete formControlName="codctactble" [dropdown]="true" [suggestions]="filteredCtaCtble" (completeMethod)="filterCtaCtble($event)" 
                        field="s_desctactble" appendTo="body" (onSelect)="selectCuenta($event)" ></p-autoComplete>
                    </span> 
                </div>
            </div>
            <div class="flex justify-content-end">
                <button pButton icon="pi pi-save" label="Grabar" type="submit" class="p-button-primary w-auto"></button>
            </div>
            
        </form>
</p-dialog>

<p-toast></p-toast>
<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '350px'}"
acceptButtonStyleClass="p-button p-button-info surface-border" rejectButtonStyleClass="p-button p-button-outlined surface-border text-900 "></p-confirmDialog>
