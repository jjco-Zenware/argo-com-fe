
<div class="card m-4">
    <div class="grid mt-2">
        <div class="flex justify-content-between col-12 -mt-3 gap-2">                                  
            <div class="mb-1 border-1 surface-border py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                <span class="text-base font-semibold">{{tituloKardex}}</span>
            </div>                         
        </div>
    </div>

    <form [formGroup]="frmDatos" class="mb-2 -mr-3 mt-1 ml-3">
        <div class="p-fluid p-formgrid grid col-9 text-sm h-5rem -ml-6">
            <div class="sm:col-6 lg:col-3 md:col-3 -mt-4 h-4rem field">
                <label class="text-blue-600 font-semibold mb-1">CÓDIGO</label>
                <span class="p-input-icon-right">
                    <i class="pi pi-search cursor-pointer" pTooltip="Busqueda Avanzada de Producto" tooltipPosition="bottom" (click)="getBusquedaAvanzada([])"></i>
                    <input type="text" pInputText formControlName="codproducto" class="p-inputtext-sm" placeholder="Ingresar Código Producto"/>
                </span>
                <!-- <span class="p-fluid mt-1">
                    <p-dropdown [options]="lstProducto" formControlName="idprod" placeholder="Seleccionar Producto" optionLabel="despro" 
                    optionValue="idprod" class="p-inputtext-sm" ></p-dropdown>
                </span>
                <p-confirmPopup></p-confirmPopup> -->
            </div> 
            <!-- <div class="md:col-6 sm:col-4 lg:col-2 -mt-4">
                <label class="font-semibold text-blue-600">FECHA INICIO</label>
                <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechaInicio" formControlName="fecini"
                    [readonlyInput]="true" appendTo="body" class="p-inputtext-sm">
                </p-calendar>
            </div>
            <div class="md:col-6 sm:col-4 lg:col-2 -mt-4">
                <label class="font-semibold text-blue-600">FECHA FIN</label>
                <p-calendar dateFormat="dd/mm/yy" [showIcon]="true" inputId="fechaFin" formControlName="fecfin"
                    [readonlyInput]="true" appendTo="body" class="p-inputtext-sm"></p-calendar>
            </div> -->
            <div class="field col-12 md:col-2 -mt-4 gap-2">
                <button pButton type="button" (click)="getListar()" pTooltip="Buscar Registros" tooltipPosition="bottom" 
                    class="font-semibold mt-3 justify-content-center h-2.5rem w-3rem w-auto h-auto" icon="pi pi-search"></button>
            </div>
        </div>
    </form> 

    <p-table #dt1 [value]="lstCatalogo" [rows]="10" [rowHover]="true" responsiveLayout="stack" [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true" [showCurrentPageReport]="true" [resizableColumns]="true" [rowsPerPageOptions]="[10,25,50]"
        currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros" 
        styleClass="p-datatable-sm card border-1 border-round surface-border p-datatable-gridlines">
           <ng-template pTemplate="header">
            <tr class="text-sm" >
                <th rowspan="2" style="width: 30px" class="surface-200" >
                    <div class="flex justify-content-between align-items-center">
                        N°
                    </div>
                </th>
                <th rowspan="2" class="surface-200">
                    <div [ngStyle]="{'width':'100px','text-align': 'center'}">
                        CÓDIGO
                    </div>
                </th>
                <th rowspan="2" style="width: 300px;" class="surface-200">PRODUCTO</th>
                <th rowspan="2" style="width: 300px;" class="surface-200">GRUPO</th>
                <th rowspan="2" style="width: 300px;" class="surface-200">CATEGORÍA</th>
                <th rowspan="2" style="width: 300px;" class="surface-200">MARCA</th>
                <th colspan="5" class="surface-200">
                    <div [ngStyle]="{'width':'400px','text-align': 'center'}">
                        DETALLES
                    </div>
                </th>
               
            </tr>
            <tr class="text-sm" >
                <th colspan="4" class="surface-200">
                    <div [ngStyle]="{'text-align': 'center'}">
                        ALMACEN
                    </div>
                </th>
                <th colspan="1" class="surface-200">
                    <div [ngStyle]="{'text-align': 'center'}">
                        STOCK
                    </div>
                </th>
                
                
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-data  let-rowIndex="rowIndex">
            <tr>
                <td [ngStyle]="{'width':'30px', 'text-align': 'center'}">
                    {{rowIndex + 1}}
                </td>
                <td>{{data.codproducto}}</td>
                <td>{{data.despro}}</td>
                <td>{{data.nomfamilia}}</td>
                <td>{{data.nomsubfamilia}}</td>
                <td>{{data.nommarca}}</td>
                <td colspan="4">{{data.nomalmacen}}</td>
                <td>{{data.saldostock }}</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="12">No se encontraron registros.</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="loadingbody">
            <tr>
                <td colspan="12">Cargando datos. Espere por favor.</td>
            </tr>
        </ng-template>
    </p-table>
</div>




<p-toast></p-toast>
<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '350px'}"
acceptButtonStyleClass="p-button p-button-info surface-border" rejectButtonStyleClass="p-button p-button-outlined surface-border text-900 "></p-confirmDialog>
