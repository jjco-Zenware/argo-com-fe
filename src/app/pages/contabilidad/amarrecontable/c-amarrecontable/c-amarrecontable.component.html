                <div class="mb-1 py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">

                </div>                         
            </div>

        <p-table #dt1 [value]="lstAmarreContable" [rows]="10" [rowHover]="true" responsiveLayout="stack" [tableStyle]="{'min-width': '50rem'}"
            [paginator]="true" [showCurrentPageReport]="true" [resizableColumns]="true" [rowsPerPageOptions]="[10,25,50]"
            currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros" 
            styleClass="p-datatable-sm card border-1 border-round surface-border p-datatable-striped">
            <ng-template pTemplate="header">
                <tr class="text-sm h-1rem">
                    <th style="width: 20px" class="bg-teal-50 border-1" >
                        <div class="flex justify-content-between align-items-center">
                            N°
                        </div>
                    </th>
                    <th style="width: 200px;" class="bg-teal-50 border-1">CÓDGIO</th>
                    <th style="width: 250px;" class="bg-teal-50 border-1">TIPO PROCESO</th>
                    <th style="width: 200px;" class="bg-teal-50 border-1">NOMBRE ASIENTO</th>
                    <th style="width: 100px;" class="bg-teal-50 border-1">ACCIÓN</th>
                </tr>
              
                <tr >
                    <th></th>
                    <th *ngFor="let col of cols">
                        <input pInputText type="text" (input)="dt1.filter($any($event.target).value, col.field, col.filterMatchMode)" class="w-full h-2rem"/>
                        
                    </th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-dato let-rowIndex="rowIndex"> 
                <tr class="text-sm">
                    <td>{{rowIndex + 1}}</td>
                    <td>{{dato.codigoasiento}}</td>
                    <td>{{dato.nomtipodocprc}}</td>
                    <td>{{dato.desasiento}}</td>
                    <td>
                        <div class="flex align-items-center m:justify-content-end" [ngStyle]="{'width':'30px'}">

                            <button pButton pRipple type="button" icon="pi pi-file-edit" tooltipPosition="bottom" pTooltip="Editar" class="p-button-rounded p-button-text z-3 ml-auto sm:ml-0 " (click)="onEditar(dato)"></button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="12">No se encontraron registros.</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="loadingbody">
                <tr>
                    <td colspan="12">Cargando datos. Espere por favor.</td>
                </tr>
            </ng-template>
        </p-table>

    </div>
</ng-container>

<ng-template #visSecciones>

    <div class="p-fluid p-3 mb-1 card m-4" *ngIf="visDetalle" (OB_back)="getDetalle($event)">
        <div class="grid ">
            <div class="flex justify-content-between col-12 gap-2">
                <div style="display: flex; justify-content: end;" class="mt-2 pl-2 h-2rem -ml-1">
                    <button pButton class="font-semibold p-button-outlined justify-content-center" icon="pi pi-backward" label="Regresar"
                        pTooltip="Regresar" tooltipPosition="left" (click)="getBack()" ></button>
                </div>
                <div class="mb-1 py-3 h-2rem flex border-round mt-2 p-2 fonthead w-full align-items-center">
                    <span class="text-lg font-semibold">{{tituloDetalle}}</span>
                </div>
            </div>
        </div>
        <app-c-amarrecontabledet [IA_data]="dataPrc"></app-c-amarrecontabledet>
    </div>

</ng-template>

<p-toast></p-toast>
<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-confirmDialog header="Confirmation" key="confirm1" [style]="{width: '450px'}"
acceptButtonStyleClass="p-button p-button-info surface-border" rejectButtonStyleClass="p-button p-button-outlined surface-border text-900 "></p-confirmDialog>
